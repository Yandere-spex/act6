<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Replacement Algorithm</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #0f1525;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff4466;
    --text: #c8d8f0;
    --dim: #4a5a7a;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1829 0%, #0f1e35 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 30px rgba(0,212,255,0.2);
  }

  header .icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  header p { font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-top: 2px; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

  /* CONTROL PANEL */
  .control-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .control-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field-group label {
    display: block;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field-group input, .field-group select {
    width: 100%;
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus, .field-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }

  .field-group select option { background: #0f1525; }

  .btn-simulate {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0090bb);
    border: none;
    border-radius: 8px;
    color: #0a0e1a;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    text-transform: uppercase;
  }

  .btn-simulate:hover {
    box-shadow: 0 0 25px rgba(0,212,255,0.5);
    transform: translateY(-1px);
  }

  .btn-simulate:active { transform: translateY(0); }

  /* RESULTS TABLE (HORIZONTAL) */
  .results-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    display: none;
    position: relative;
    overflow: hidden;
  }

  .results-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .algo-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .n-label {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* HORIZONTAL TABLE */
  .table-scroll { overflow-x: auto; }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: max-content;
  }

  table th {
    background: rgba(0,212,255,0.08);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 16px;
    text-align: center;
    border: 1px solid var(--border);
    white-space: nowrap;
    font-family: 'Orbitron', sans-serif;
  }

  table td {
    padding: 9px 16px;
    text-align: center;
    border: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
    transition: background 0.2s;
  }

  table tr:hover td { background: rgba(0,212,255,0.04); }

  .row-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    text-align: left !important;
    background: rgba(0,0,0,0.2) !important;
    text-transform: uppercase;
  }

  .cell-fault {
    color: var(--red);
    font-weight: bold;
    text-shadow: 0 0 8px rgba(255,68,102,0.5);
  }

  .cell-hit {
    color: var(--green);
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,255,136,0.5);
  }

  .cell-page {
    color: var(--accent);
  }

  .cell-new {
    color: var(--accent2);
    font-weight: bold;
  }

  .cell-empty { color: var(--dim); }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 24px;
  }

  .stat-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .stat-box .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .stat-box .stat-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-faults .stat-val { color: var(--red); text-shadow: 0 0 15px rgba(255,68,102,0.4); }
  .stat-hits .stat-val { color: var(--green); text-shadow: 0 0 15px rgba(0,255,136,0.4); }
  .stat-fp .stat-val { color: var(--accent2); }
  .stat-hp .stat-val { color: var(--accent); }

  /* VERTICAL STEPS */
  .steps-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    display: none;
    position: relative;
    overflow: hidden;
  }

  .steps-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--accent));
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-top: 4px;
  }

  .step-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(10px); }
  }

  .step-header {
    padding: 8px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .step-header.fault { background: rgba(255,68,102,0.15); color: var(--red); border-bottom: 1px solid rgba(255,68,102,0.3); }
  .step-header.hit { background: rgba(0,255,136,0.1); color: var(--green); border-bottom: 1px solid rgba(0,255,136,0.2); }

  .step-page { font-size: 18px; font-family: 'Orbitron', sans-serif; font-weight: 700; padding: 8px 12px 4px; color: var(--accent); }

  .step-frames { padding: 4px 12px 12px; }

  .frame-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .frame-row:last-child { border-bottom: none; }

  .frame-label { font-size: 10px; color: var(--dim); width: 52px; flex-shrink: 0; }

  .frame-val {
    font-size: 14px;
    font-weight: bold;
  }

  .frame-val.new { color: var(--accent2); }
  .frame-val.old { color: var(--text); }
  .frame-val.empty { color: var(--dim); }

  /* LEGEND */
  .legend {
    margin-top: 16px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    display: flex;
    gap: 20px;
  }

  .legend span { display: flex; align-items: center; gap: 6px; }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-f { background: var(--red); }
  .dot-h { background: var(--green); }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .controls-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    header { padding: 16px 20px; }
    header h1 { font-size: 14px; }
    .steps-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="icon">⚙️</div>
  <div>
    <h1>Page Replacement Algorithm</h1>
    <p>OPERATING SYSTEMS SIMULATOR — FIFO / OPT / LRU</p>
  </div>
</header>

<div class="container">

  <!-- CONTROL PANEL -->
  <div class="control-panel">
    <div class="panel-title">Configuration</div>
    <div class="controls-grid">
      <div class="field-group">
        <label>Algorithm</label>
        <select id="algo">
          <option value="fifo">First-In-First-Out (FIFO)</option>
          <option value="opt">Optimal (OPT)</option>
          <option value="lru">Least Recently Used (LRU)</option>
        </select>
      </div>
      <div class="field-group">
        <label>Reference String (comma separated)</label>
        <input type="text" id="refString" value="1,2,3,5,6,7" placeholder="e.g. 1,2,3,4,1,2,5">
      </div>
      <div class="field-group">
        <label>Frames (N)</label>
        <input type="number" id="frames" value="3" min="1" max="10">
      </div>
    </div>
    <button class="btn-simulate" onclick="simulate()">▶ SIMULATE</button>
  </div>

  <!-- HORIZONTAL TABLE RESULTS -->
  <div class="results-section" id="resultsSection">
    <div class="panel-title">Simulation Result</div>
    <div class="algo-label" id="algoLabel"></div>
    <div class="n-label" id="nLabel"></div>
    <div class="table-scroll">
      <table id="resultTable"></table>
    </div>
    <div class="legend">
      <span><span class="dot dot-f"></span> F = Fault</span>
      <span><span class="dot dot-h"></span> H = Hit</span>
    </div>
    <div class="stats-row">
      <div class="stat-box stat-faults">
        <div class="stat-val" id="statFaults">0</div>
        <div class="stat-label">Page Faults</div>
      </div>
      <div class="stat-box stat-hits">
        <div class="stat-val" id="statHits">0</div>
        <div class="stat-label">Hits</div>
      </div>
      <div class="stat-box stat-fp">
        <div class="stat-val" id="statFP">0%</div>
        <div class="stat-label">Fault %</div>
      </div>
      <div class="stat-box stat-hp">
        <div class="stat-val" id="statHP">0%</div>
        <div class="stat-label">Hit %</div>
      </div>
    </div>
  </div>

  <!-- VERTICAL STEP-BY-STEP -->
  <div class="steps-section" id="stepsSection">
    <div class="panel-title">Step-by-Step (Vertical View)</div>
    <div class="steps-grid" id="stepsGrid"></div>
  </div>

</div>

<footer>PAGE REPLACEMENT ALGORITHM SIMULATOR &nbsp;|&nbsp; FIFO · OPT · LRU</footer>

<script>
function parseRef(str) {
  return str.split(',').map(s => s.trim()).filter(s => s !== '').map(Number).filter(n => !isNaN(n));
}

function runFIFO(refs, n) {
  let frames = [];
  let queue = [];
  let steps = [];
  for (let ref of refs) {
    let hit = frames.includes(ref);
    let evicted = null;
    if (!hit) {
      if (frames.length < n) {
        frames.push(ref);
        queue.push(ref);
      } else {
        evicted = queue.shift();
        let idx = frames.indexOf(evicted);
        frames[idx] = ref;
        queue.push(ref);
      }
    }
    steps.push({ ref, frames: [...frames], hit, newPage: hit ? null : ref, n });
  }
  return steps;
}

function runLRU(refs, n) {
  let frames = [];
  let recent = [];
  let steps = [];
  for (let ref of refs) {
    let hit = frames.includes(ref);
    if (!hit) {
      if (frames.length < n) {
        frames.push(ref);
      } else {
        let lru = recent.find(p => frames.includes(p));
        let idx = frames.indexOf(lru);
        frames[idx] = ref;
      }
    }
    recent = recent.filter(p => p !== ref);
    recent.unshift(ref);
    steps.push({ ref, frames: [...frames], hit, newPage: hit ? null : ref, n });
  }
  return steps;
}

function runOPT(refs, n) {
  let frames = [];
  let steps = [];
  for (let i = 0; i < refs.length; i++) {
    let ref = refs[i];
    let hit = frames.includes(ref);
    if (!hit) {
      if (frames.length < n) {
        frames.push(ref);
      } else {
        let future = frames.map(f => {
          let next = refs.indexOf(f, i + 1);
          return next === -1 ? Infinity : next;
        });
        let replaceIdx = future.indexOf(Math.max(...future));
        frames[replaceIdx] = ref;
      }
    }
    steps.push({ ref, frames: [...frames], hit, newPage: hit ? null : ref, n });
  }
  return steps;
}

function simulate() {
  const algo = document.getElementById('algo').value;
  const refStr = document.getElementById('refString').value;
  const n = parseInt(document.getElementById('frames').value);
  const refs = parseRef(refStr);

  if (!refs.length || isNaN(n) || n < 1) {
    alert('Please enter a valid reference string and frame count.');
    return;
  }

  let steps = [];
  if (algo === 'fifo') steps = runFIFO(refs, n);
  else if (algo === 'lru') steps = runLRU(refs, n);
  else steps = runOPT(refs, n);

  const algoNames = { fifo: 'FIRST-IN-FIRST-OUT (FIFO)', opt: 'OPTIMAL (OPT)', lru: 'LEAST RECENTLY USED (LRU)' };

  document.getElementById('algoLabel').textContent = algoNames[algo];
  document.getElementById('nLabel').textContent = `N = ${n}`;

  // BUILD HORIZONTAL TABLE
  buildTable(steps, n);

  // BUILD VERTICAL STEPS
  buildSteps(steps, n);

  // STATS
  let faults = steps.filter(s => !s.hit).length;
  let hits = steps.filter(s => s.hit).length;
  let total = steps.length;
  document.getElementById('statFaults').textContent = faults;
  document.getElementById('statHits').textContent = hits;
  document.getElementById('statFP').textContent = (faults / total * 100).toFixed(2) + '%';
  document.getElementById('statHP').textContent = (hits / total * 100).toFixed(2) + '%';

  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('stepsSection').style.display = 'block';
}

function buildTable(steps, n) {
  const table = document.getElementById('resultTable');
  table.innerHTML = '';

  // Header row
  let thead = '<thead><tr><th>ROW</th>';
  steps.forEach((s, i) => { thead += `<th>${i + 1}</th>`; });
  thead += '</tr></thead>';

  // Reference string row
  let refRow = `<tr><td class="row-label">Ref String</td>`;
  steps.forEach(s => { refRow += `<td class="cell-page">${s.ref}</td>`; });
  refRow += '</tr>';

  // Frame rows
  let frameRows = '';
  for (let f = 0; f < n; f++) {
    frameRows += `<tr><td class="row-label">Frame ${f + 1}</td>`;
    steps.forEach(s => {
      let val = s.frames[f] !== undefined ? s.frames[f] : '-';
      let cls = val === '-' ? 'cell-empty' : (s.newPage === val && !s.hit ? 'cell-new' : '');
      frameRows += `<td class="${cls}">${val}</td>`;
    });
    frameRows += '</tr>';
  }

  // Hit/Fault row
  let hfRow = `<tr><td class="row-label">Hit / Fault</td>`;
  steps.forEach(s => {
    hfRow += `<td class="${s.hit ? 'cell-hit' : 'cell-fault'}">${s.hit ? 'H' : 'F'}</td>`;
  });
  hfRow += '</tr>';

  table.innerHTML = thead + '<tbody>' + refRow + frameRows + hfRow + '</tbody>';
}

function buildSteps(steps, n) {
  const grid = document.getElementById('stepsGrid');
  grid.innerHTML = '';
  steps.forEach((s, i) => {
    let framesHTML = '';
    for (let f = 0; f < n; f++) {
      let val = s.frames[f] !== undefined ? s.frames[f] : null;
      let cls = val === null ? 'empty' : (s.newPage === val && !s.hit ? 'new' : 'old');
      framesHTML += `
        <div class="frame-row">
          <span class="frame-label">Frame ${f + 1}</span>
          <span class="frame-val ${cls}">${val !== null ? val : '—'}</span>
        </div>`;
    }

    let card = document.createElement('div');
    card.className = 'step-card';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="step-header ${s.hit ? 'hit' : 'fault'}">
        <span>Step ${i + 1}</span>
        <span>${s.hit ? 'HIT' : 'FAULT'}</span>
      </div>
      <div class="step-page">Page: ${s.ref}</div>
      <div class="step-frames">${framesHTML}</div>`;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
